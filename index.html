<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>AIL Novara - Prenotazione Trasporto</title>

    <link rel="manifest" href="manifest.json" />

    <meta name="theme-color" content="#d32f2f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AIL Trasporto" />

    <link rel="apple-touch-icon" href="icon.png" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
        :root {
            --primary: #d32f2f;
            --primary-dark: #b71c1c;
            --green: #25D366;
            --green-dark: #128C7E;

            --glass: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.45);

            --text: #111;
            --text-light: #555;

            --shadow:
                0 20px 40px rgba(0,0,0,.18),
                inset 0 1px 0 rgba(255,255,255,.6);

            --radius: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background:
                linear-gradient(rgba(0,0,0,.22), rgba(0,0,0,.22)),
                url('background.jpg') center center / cover no-repeat fixed;
            color: var(--text);
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(170%);
            -webkit-backdrop-filter: blur(25px) saturate(170%);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 26px;
            box-shadow: var(--shadow);
            animation: fadeUp .5s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 22px;
        }

        .logo-container {
            width: 120px;
            margin: 0 auto 12px auto;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -.6px;
            color: var(--primary);
        }

        .subtitle {
            margin-top: 2px;
            font-size: 14px;
            font-weight: 600;
            color: #222;
        }

        .info-box {
            background: rgba(211, 47, 47, 0.07);
            border-left: 4px solid var(--primary);
            border-radius: 14px;
            padding: 12px 14px;
            font-size: 13px;
            line-height: 1.4;
            color: var(--primary-dark);
            margin-bottom: 22px;
            font-weight: 500;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .inner-label {
            display: block;
            margin-bottom: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .8px;
            color: #333;
        }

        input {
            width: 100%;
            height: 48px;
            border: 1px solid rgba(0,0,0,.15);
            border-radius: 12px;
            padding: 0 14px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
            background: rgba(255,255,255,.6);
            transition: .2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255,255,255,.95);
            box-shadow: 0 0 0 4px rgba(211,47,47,.12);
        }

        .trip-row {
            display: grid;
            grid-template-columns: 1.1fr 1fr auto;
            gap: 10px;
            align-items: end;
            background: rgba(255,255,255,.35);
            border: 1px solid rgba(255,255,255,.2);
            border-radius: 16px;
            padding: 12px 10px;
            margin-bottom: 12px;
            animation: fadeIn .25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .trip-field {
            display: flex;
            flex-direction: column;
        }

        input[type="date"]::before { content: "Seleziona data 🗓️"; color: #555; width: 100%; font-weight: 500; }
        input[type="date"]:focus::before, input[type="date"]:valid::before { display: none; }
        
        input[type="time"]::before { content: "Scegli ora ⏰"; color: #555; width: 100%; font-weight: 500; }
        input[type="time"]:focus::before, input[type="time"]:valid::before { display: none; }

        .btn-add-date {
            width: 100%;
            border: 1px dashed var(--primary);
            background: rgba(211,47,47,.06);
            color: var(--primary);
            border-radius: 12px;
            padding: 13px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: .2s ease;
            margin-top: 2px;
            margin-bottom: 14px;
        }

        .btn-add-date:hover {
            background: rgba(211,47,47,.12);
        }

        .btn-remove-date {
            width: 38px;
            height: 48px;
            border: none;
            border-radius: 10px;
            background: #e53935;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: .2s ease;
            box-shadow: 0 3px 8px rgba(229,57,53,.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-remove-date:hover {
            background: #c62828;
        }

        .btn-submit {
            width: 100%;
            margin-top: 8px;
            border: none;
            border-radius: 14px;
            background: var(--green);
            color: white;
            height: 52px;
            font-size: 16px;
            font-weight: 700;
