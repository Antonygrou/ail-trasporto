<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>AIL Novara - Prenotazione Trasporto</title>
    
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#d32f2f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AIL Trasporto" />
    <link rel="apple-touch-icon" href="icon.png" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
        :root {
            --primary: #d32f2f;
            --primary-dark: #b71c1c;
            --green: #25D366;
            --green-dark: #128C7E;
            /* ✨ УЛЬТРА-СКЛО: Ще прозоріший фон (0.15 замість 0.25) */
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text: #000000;
            --text-light: #111;
            /* ✨ Покращена тінь для кращого відділення від фону */
            --shadow: 0 25px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.5);
            --radius: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)),
                        url('background.jpg') center center / cover no-repeat fixed;
            color: var(--text);
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--glass);
            /* ✨ Збільшене розмиття для кращого ефекту скла */
            backdrop-filter: blur(50px) saturate(220%);
            -webkit-backdrop-filter: blur(50px) saturate(220%);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 26px;
            box-shadow: var(--shadow);
            animation: fadeUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            /* ✨ Тінь для тексту, щоб він не губився на фоні */
            text-shadow: 0 1px 1px rgba(255, 255, 255, 0.5);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header { text-align: center; margin-bottom: 22px; }
        .logo { max-width: 130px; height: auto; margin-bottom: 12px; }
        h1 { font-size: 26px; font-weight: 800; letter-spacing: -.6px; color: var(--primary); text-shadow: 0 2px 2px rgba(0,0,0,0.15), 0 0 1px rgba(255, 255, 255, 0.8); }
        .subtitle { margin-top: 2px; font-size: 14px; font-weight: 700; color: #000; text-transform: uppercase; letter-spacing: 0.5px; text-shadow: 0 1px 1px rgba(255, 255, 255, 0.6); }

        .info-box {
            background: rgba(211, 47, 47, 0.15);
            border-left: 4px solid var(--primary);
            border-radius: 14px;
            padding: 12px 14px;
            font-size: 13px;
            line-height: 1.4;
            color: var(--primary-dark);
            margin-bottom: 22px;
            font-weight: 700;
            text-shadow: none;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-group { margin-bottom: 14px; width: 100%; }
        /* ✨ Чіткіший текст лейблів */
        .inner-label { display: block; margin-bottom: 6px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .8px; color: #000; text-shadow: 0 1px 0 rgba(255, 255, 255, 0.7); }

        input {
            width: 100%;
            height: 48px;
            border: 1px solid rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 0 14px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
            background: rgba(255,255,255,0.3);
            transition: all 0.25s ease;
            text-shadow: none;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255,255,255,0.9);
            box-shadow: 0 0 0 4px rgba(211,47,47,0.2);
        }

        .trip-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            align-items: end;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 14px 12px;
            margin-bottom: 12px;
            animation: fadeIn 0.3s ease;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .trip-field { display: flex; flex-direction: column; }

        .btn-add-date {
            width: 100%;
            border: 1px dashed var(--primary);
            background: rgba(211, 47, 47, 0.1);
            color: var(--primary);
            border-radius: 12px;
            padding: 13px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 2px;
            margin-bottom: 14px;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.5);
        }
        .btn-add-date:hover { background: rgba(211,47,47,0.18); }
        .btn-add-date:active { transform: scale(0.97); background: rgba(211,47,47,0.25); }

        .btn-remove-date {
            grid-column: span 2;
            height: 38px; border: none; border-radius: 10px;
            background: #e53935; color: white; font-size: 14px; font-weight: 600; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 3px 10px rgba(229,57,53,0.35);
            margin-top: 4px;
            transition: all 0.2s ease;
            text-shadow: none;
        }
        .btn-remove-date:hover { background: #c62828; }
        .btn-remove-date:active { transform: scale(0.98); }

        .btn-submit {
            width: 100%; margin-top: 8px; border: none; border-radius: 14px;
            background: var(--green); color: white; height: 52px;
            font-size: 16px; font-weight: 800; cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.35);
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.2);
        }
        .btn-submit:hover { background: var(--green-dark); }
        .btn-submit:active { transform: scale(0.98); }

        @media (max-width: 480px) {
            .container { padding: 20px; background: rgba(255, 255, 255, 0.2); }
            .grid-2 { grid-template-columns: 1fr; gap: 0; }
            .trip-row { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <img src="logo.png" alt="AIL Logo" class="logo" />
            <h1>AIL Novara</h1>
            <p class="subtitle">Prenotazione Trasporto</p>
        </div>

        <div class="info-box">
            Completare tutti i campi richiesti. Al termine verrà generato un messaggio pronto da inviare via WhatsApp.
        </div>

        <div class="form-mock">
            <div class="grid-2">
                <div class="form-group">
                    <label class="inner-label" for="cognome">Cognome</label>
                    <input type="text" id="cognome" placeholder="Es. Rossi" required enterkeyhint="next" />
                </div>
                <div class="form-group">
                    <label class="inner-label" for="nome">Nome</label>
                    <input type="text" id="nome" placeholder="Es. Giulio" required enterkeyhint="next" />
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label class="inner-label" for="citta">Città</label>
                    <input type="text" id="citta" placeholder="Es. Novara" required enterkeyhint="next" />
                </div>
                <div class="form-group">
                    <label class="inner-label" for="indirizzo">Via e Civico</label>
                    <input type="text" id="indirizzo" placeholder="Es. Via Verga 12" required enterkeyhint="next" />
                </div>
            </div>

            <div class="form-group">
                <label class="inner-label" for="note">Note aggiuntive (Opzionale)</label>
                <input type="text" id="note" placeholder="Es. sedia a rotelle, accompagnatore..." enterkeyhint="done" />
            </div>

            <div class="form-group">
                <label class="inner-label">Date e Orari Trasporti</label>
                <div id="tripsContainer">
                    
                    <div class="trip-row">
                        <div class="trip-field">
                            <label class="inner-label" style="font-size: 10px; color: var(--text-light); text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);">Data 🗓️</label>
                            <input type="date" class="date-input" required />
                        </div>
                        <div class="trip-field">
                            <label class="inner-label" style="font-size: 10px; color: var(--text-light); text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);">Ora ⏰</label>
                            <input type="time" class="time-input" required />
                        </div>
                    </div>

                </div>

                <button type="button" class="btn-add-date" id="addTripBtn">
                    + Aggiungi un altro giorno (Max 5)
                </button>
            </div>

            <button type="button" class="btn-submit" id="submitBtn">
                Genera Messaggio WhatsApp
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
            }

            const MAX_TRIPS = 5;
            // 📞 Головний номер координатора організації для первинного чату
            const WHATSAPP_NUMBER = '393792857328';

            const container = document.getElementById('tripsContainer');
            const addBtn = document.getElementById('addTripBtn');
            const submitBtn = document.getElementById('submitBtn');

            let tripIndex = 2;

            const today = new Date().toISOString().split('T')[0];
            document.querySelectorAll('.date-input').forEach(input => input.min = today);

            const sanitize = (text) => text.replace(/[<>]/g, '').trim();

            const getItalianDayName = (dateString) => {
                const days = ['Domenica', 'Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì', 'Sabato'];
                const dateParts = dateString.split('-');
                const dateObj = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]);
                return days[dateObj.getDay()];
            };

            const formatDate = (date) => {
                const [year, month, day] = date.split('-');
                return `${day}/${month}/${year}`;
            };

            const updateAddButton = () => {
                const rows = document.querySelectorAll('.trip-row');
                addBtn.style.display = rows.length >= MAX_TRIPS ? 'none' : 'block';
            };

            const createTripRow = () => {
                const rows = document.querySelectorAll('.trip-row');
                if (rows.length >= MAX_TRIPS) return;

                const row = document.createElement('div');
                row.className = 'trip-row';

                row.innerHTML = `
                    <div class="trip-field">
                        <label class="inner-label" style="font-size: 10px; color: var(--text-light); text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);">Data 🗓️</label>
                        <input type="date" class="date-input" required />
                    </div>
                    <div class="trip-field">
                        <label class="inner-label" style="font-size: 10px; color: var(--text-light); text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);">Ora ⏰</label>
                        <input type="time" class="time-input" required />
                    </div>
                    <button type="button" class="btn-remove-date">Elimina questo giorno</button>
                `;

                row.querySelector('.btn-remove-date').addEventListener('click', () => {
                    row.remove();
                    updateAddButton();
                });

                container.appendChild(row);
                // Активуємо захист від дат "на вчора" для кожного нового рядка
                row.querySelector('.date-input').min = today;
                
                tripIndex++;
                updateAddButton();
            };

            addBtn.addEventListener('click', createTripRow);

            submitBtn.addEventListener('click', () => {
                const cognomeInput = document.getElementById('cognome');
                const nomeInput = document.getElementById('nome');
                const cittaInput = document.getElementById('citta');
                const indirizzoInput = document.getElementById('indirizzo');

                if (!cognomeInput.value || !nomeInput.value || !cittaInput.value || !indirizzoInput.value) {
                    alert('Per favore, compila tutti i campi richiesti.');
                    return;
                }

                const cognome = sanitize(cognomeInput.value);
                const nome = sanitize(nomeInput.value);
                const citta = sanitize(cittaInput.value);
                const indirizzo = sanitize(indirizzoInput.value);
                const rows = document.querySelectorAll('.trip-row');

                let whatsappTrips = '';
                let valid = true;

                rows.forEach((row, index) => {
                    const dateInput = row.querySelector('.date-input');
                    const timeInput = row.querySelector('.time-input');

                    if (!dateInput.value || !timeInput.value) {
                        valid = false;
                        return;
                    }

                    const formattedDate = formatDate(dateInput.value);
                    const dayName = getItalianDayName(dateInput.value);
                    whatsappTrips += `   ${index + 1}) *${dayName}* - ${formattedDate} ➜ ore *${timeInput.value}*\n`;
                });

                if (!valid) {
                    alert('Per favore, imposta data e ora per tutti i giorni aggiunti.');
                    return;
                }

                // Зчитуємо та очищуємо поле приміток
                const noteInput = document.getElementById('note');
                const noteText = noteInput.value ? sanitize(noteInput.value) : 'Nessuna';

                const whatsappText = `*PRENOTAZIONE TRASPORTO - AIL NOVARA*\n\n` +
                                     `• *Cognome:* ${cognome}\n` +
                                     `• *Nome:* ${nome}\n` +
                                     `• *Indirizzo:* ${indirizzo}, ${citta} 📍\n` +
                                     `• *Note:* ${noteText} 📝\n\n` +
                                     `• *Viaggi richiesti:*\n${whatsappTrips}`;

                /* 📧 ТУТ МІСЦЕ ДЛЯ EMAILJS (Коли підключимо сервіс, код відправки на пошту буде тут):
                   emailjs.send("service_id", "template_id", { ... });
                */

                // 📱 Відкриваємо чат з головним номером
                window.open(`https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(whatsappText)}`, '_blank');
            });
        });
    </script>
</body>
</html>
