<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>AIL Novara - Prenotazione Trasporto</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#d32f2f" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="AIL Trasporto" />
<link rel="apple-touch-icon" href="icon.png" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
:root{
    --primary:#d32f2f;
    --primary-dark:#b71c1c;
    --green:#25D366;
    --green-dark:#128C7E;
    --text:#111111;
    --text-light:#555555;
    --radius:28px;
    --shadow: 0 24px 60px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.4);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow-x:hidden;
    padding:
        max(20px, env(safe-area-inset-top))
        max(20px, env(safe-area-inset-right))
        max(20px, env(safe-area-inset-bottom))
        max(20px, env(safe-area-inset-left));
    background:
        linear-gradient(rgba(0,0,0,0.34), rgba(0,0,0,0.34)),
        url('background.jpg');
    background-size:cover;
    background-position:center center;
    background-repeat:no-repeat;
    color:var(--text);
}

.container{
    width:100%;
    max-width:500px;
    background: rgba(255, 255, 255, 0.94);
    border:1px solid rgba(255,255,255,0.22);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border-radius:var(--radius);
    padding:28px;
    box-shadow:var(--shadow);
    transform:translateZ(0);
    will-change:transform;
    animation:fadeUp .5s cubic-bezier(.23,1,.32,1);
}

@keyframes fadeUp{
    from{ opacity:0; transform:translateY(25px); }
    to{ opacity:1; transform:translateY(0); }
}

.header{
    text-align:center;
    margin-bottom:24px;
}

.logo{
    width:130px;
    max-width:100%;
    margin-bottom:14px;
}

h1{
    font-size:28px;
    font-weight:800;
    letter-spacing:-0.7px;
    color:var(--primary);
}

.subtitle{
    margin-top:4px;
    font-size:14px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.6px;
    color:#111111;
}

.info-box{
    background:#ffebee;
    border-left:4px solid var(--primary);
    border-radius:18px;
    padding:15px;
    margin-bottom:24px;
    font-size:13px;
    line-height:1.5;
    color:var(--primary-dark);
    font-weight:600;
}

.grid-2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.form-group{
    margin-bottom:16px;
    width:100%;
}

.inner-label{
    display:block;
    margin-bottom:7px;
    font-size:11px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:0.8px;
    color:#111111;
}

input, button{ font-size:16px; }

input{
    width:100%;
    height:54px;
    border:1px solid rgba(0,0,0,0.15);
    border-radius:16px;
    padding:0 16px;
    font-size:16px;
    font-weight:500;
    color:var(--text);
    background:#ffffff;
    appearance:none;
    -webkit-appearance:none;
    transition:all .2s ease;
}

input::placeholder{ color:#8a8a8a; }
input:focus{
    outline:none;
    border-color:var(--primary);
    box-shadow:0 0 0 4px rgba(211,47,47,0.14);
    background:white;
}

.trip-row{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    background:rgba(0, 0, 0, 0.03);
    border:1px solid rgba(0, 0, 0, 0.08);
    border-radius:18px;
    padding:14px;
    margin-bottom:14px;
    animation:fadeIn .3s ease;
}

@keyframes fadeIn{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
}

.trip-field{
    display:flex;
    flex-direction:column;
    min-width:0;
}

.btn-add-date{
    width:100%;
    border:1px dashed var(--primary);
    background:rgba(211,47,47,0.08);
    color:var(--primary);
    border-radius:14px;
    padding:14px;
    margin-top:2px;
    margin-bottom:14px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    transition:all .25s cubic-bezier(.175,.885,.32,1.275);
}
.btn-add-date:hover{ background:rgba(211,47,47,0.14); }
.btn-add-date:active{ transform:scale(.98); }

.btn-remove-date{
    grid-column: span 2;
    width:100%;
    height:40px;
    border:none;
    border-radius:12px;
    background:var(--primary);
    color:white;
    font-size:13px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.5px;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-top:4px;
    box-shadow:0 5px 12px rgba(211,47,47,0.25);
    transition:all .2s ease;
}
.btn-remove-date:hover{ background:var(--primary-dark); }
.btn-remove-date:active{ transform:scale(.98); }

.btn-submit{
    width:100%;
    margin-top:10px;
    border:none;
    border-radius:18px;
    background:var(--green);
    color:white;
    height:58px;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 10px 24px rgba(37,211,102,0.32);
    transition:all .25s cubic-bezier(.175,.885,.32,1.275);
}
.btn-submit:hover{ background:var(--green-dark); transform:translateY(-2px); }
.btn-submit:active{ transform:scale(.98); }

.footer{
    margin-top:18px;
    text-align:center;
    font-size:12px;
    font-weight:600;
    color:rgba(0,0,0,0.65);
}

@media (max-width:480px){
    body{ background-position:62% center; }
    .container{ padding:22px; }
    .grid-2{ grid-template-columns:1fr; gap:0; }
    .trip-row{ grid-template-columns: 1fr 1fr; gap: 12px; }
    h1{ font-size:25px; }
}
</style>
</head>

<body>
<div class="container">
    <div class="header">
        <img src="logo.png" alt="AIL Logo" class="logo" />
        <h1 id="lang-title">AIL Novara</h1>
        <p class="subtitle" id="lang-subtitle">Prenotazione Orario di Trasporto</p>
    </div>

    <div class="info-box" id="lang-infobox">
        <strong>Servizio Trasporto:</strong> Compila i campi richiesti. I dettagli verranno aperti direttamente su WhatsApp.
    </div>

    <div class="form-mock">
        <div class="grid-2">
            <div class="form-group">
                <label class="inner-label" for="cognome" id="lang-cognome">Cognome</label>
                <input type="text" id="cognome" placeholder="Es. Rossi" required enterkeyhint="next" />
            </div>
            <div class="form-group">
                <label class="inner-label" for="nome" id="lang-nome">Nome</label>
                <input type="text" id="nome" placeholder="Es. Giulio" required enterkeyhint="next" />
            </div>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label class="inner-label" for="citta" id="lang-citta">Città</label>
                <input type="text" id="citta" placeholder="Es. Novara" required enterkeyhint="next" />
            </div>
            <div class="form-group">
                <label class="inner-label" for="indirizzo" id="lang-indirizzo">Via e Civico</label>
                <input type="text" id="indirizzo" placeholder="Es. Via Verga 12" required enterkeyhint="next" />
            </div>
        </div>

        <div class="form-group">
            <label class="inner-label" for="note" id="lang-note">Note aggiuntive (Opzionale)</label>
            <input type="text" id="note" placeholder="Es. sedia a rotelle, accompagnatore..." enterkeyhint="done" />
        </div>

        <div class="form-group">
            <label class="inner-label" id="lang-title-trips">Date e Orari Trasporti</label>
            <div id="tripsContainer">
                <div class="trip-row">
                    <div class="trip-field">
                        <label class="inner-label lang-row-data" style="font-size:10px;color:var(--text-light)">Data 🗓️</label>
                        <input type="date" class="date-input" required />
                    </div>
                    <div class="trip-field">
                        <label class="inner-label lang-row-ora" style="font-size:10px;color:var(--text-light)">Ora ⏰</label>
                        <input type="time" class="time-input" required />
                    </div>
                </div>
            </div>

            <button type="button" class="btn-add-date" id="addTripBtn">+ Aggiungi un altro giorno (Max 5)</button>
        </div>

        <button type="button" class="btn-submit" id="submitBtn">Apri su WhatsApp</button>
        <div class="footer">AIL Novara • Trasporto Pazienti</div>
    </div>
</div>

<script>

    }

    const MAX_TRIPS = 5;
