<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>AIL Novara - Prenotazione Trasporto</title>
    
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#d32f2f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AIL Trasporto" />
    <link rel="apple-touch-icon" href="icon.png" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
        :root {
            --primary: #d32f2f;
            --primary-dark: #b71c1c;
            --green: #25D366;
            --green-dark: #128C7E;
            --glass: rgba(255, 255, 255, 0.94);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text: #111111;
            --text-light: #444444;
            --shadow: 0 20px 45px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.8);
            --radius: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(rgba(0,0,0,0.12), rgba(0,0,0,0.12)),
                        url('background.jpg') center center / cover no-repeat fixed;
            color: var(--text);
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 26px;
            box-shadow: var(--shadow);
            animation: fadeUp 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header { text-align: center; margin-bottom: 22px; }
        .logo { max-width: 130px; height: auto; margin-bottom: 12px; }
        h1 { font-size: 26px; font-weight: 800; letter-spacing: -.6px; color: var(--primary); }
        .subtitle { margin-top: 2px; font-size: 14px; font-weight: 700; color: #111111; text-transform: uppercase; letter-spacing: 0.5px; }

        .info-box {
            background: #ffebee;
            border-left: 4px solid var(--primary);
            border-radius: 14px;
            padding: 12px 14px;
            font-size: 13px;
            line-height: 1.4;
            color: var(--primary-dark);
            margin-bottom: 22px;
            font-weight: 600;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-group { margin-bottom: 14px; width: 100%; }
        .inner-label { display: block; margin-bottom: 6px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .8px; color: #111111; }

        input {
            width: 100%;
            height: 48px;
            border: 1px solid rgba(0,0,0,0.18);
            border-radius: 12px;
            padding: 0 14px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
            background: #ffffff;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(211,47,47,0.12);
        }

        /* ✨ ТУТ ВИПРАВЛЕНО: Рядок поїздок тепер гнучкий флексбокс */
        .trip-row {
            display: flex;
            flex-direction: row;
            gap: 12px;
            align-items: flex-end;
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 16px;
            padding: 14px 12px;
            margin-bottom: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .trip-field { flex: 1; display: flex; flex-direction: column; }

        .btn-add-date {
            width: 100%;
            border: 1px dashed var(--primary);
            background: rgba(211, 47, 47, 0.05);
            color: var(--primary);
            border-radius: 12px;
            padding: 13px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 2px;
            margin-bottom: 14px;
        }
        .btn-add-date:hover { background: rgba(211,47,47,0.1); }
        .btn-add-date:active { transform: scale(0.97); }

        .btn-remove-date {
            width: 100%;
            height: 38px; border: none; border-radius: 10px;
            background: #d32f2f; color: white; font-size: 13px; font-weight: 700; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 3px 8px rgba(211,47,47,0.2);
            margin-top: 4px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-remove-date:hover { background: #b71c1c; }
        .btn-remove-date:active { transform: scale(0.98); }

        .btn-submit {
            width: 100%; margin-top: 8px; border: none; border-radius: 14px;
            background: var(--green); color: white; height: 52px;
            font-size: 16px; font-weight: 700; cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.25);
        }
        .btn-submit:hover { background: var(--green-dark); }
        .btn-submit:active { transform: scale(0.98); }

        @media (max-width: 480px) {
            .container { padding: 20px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); }
            .grid-2 { grid-template-columns: 1fr; gap: 0; }
            
            /* ✨ МОБІЛЬНА АДАПТАЦІЯ: На телефонах поля дати та часу стають одне під одним */
            .trip-row {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .btn-remove-date {
                margin-top: 6px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <img src="logo.png" alt="AIL Logo" class="logo" />
            <h1>AIL Novara</h1>
            <p class="subtitle">Prenotazione Orario di Trasporto</p>
        </div>

        <div class="info-box">
            <strong>Servizio Trasporto:</strong> Compila i campi richiesti. I dettagli verranno aperti direttamente su WhatsApp.
        </div>

        <div class="form-mock">
            <div class="grid-2">
                <div class="form-group">
                    <label class="inner-label" for="cognome">Cognome</label>
                    <input type="text" id="cognome" placeholder="Es. Rossi" required enterkeyhint="next" />
                </div>
                <div class="form-group">
                    <label class="inner-label" for="nome">Nome</label>
                    <input type="text" id="nome" placeholder="Es. Giulio" required enterkeyhint="next" />
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label class="inner-label" for="citta">Città</label>
                    <input type="text" id="citta" placeholder="Es. Novara" required enterkeyhint="next" />
                </div>
                <div class="form-group">
                    <label class="inner-label" for="indirizzo">Via e Civico</label>
                    <input type="text" id="indirizzo" placeholder="Es. Via Verga 12" required enterkeyhint="next" />
                </div>
            </div>

            <div class="form-group">
                <label class="inner-label" for="note">Note aggiuntive (Opzionale)</label>
                <input type="text" id="note" placeholder="Es. sedia a rotelle, accompagnatore..." enterkeyhint="done" />
            </div>

            <div class="form-group">
                <label class="inner-label">Date e Orari Trasporti</label>
                <div id="tripsContainer">
                    
                    <div class="trip-row">
                        <div class="trip-field">
                            <label class="inner-label" style="font-size: 10px; color: var(--text-light);">Data 🗓️</label>
                            <input type="date" class="date-input" required />
                        </div>
                        <div class="trip-field">
                            <label class="inner-label" style="font-size: 10px; color: var(--text-light);">Ora ⏰</label>
                            <input type="time" class="time-input" required />
                        </div>
                    </div>

                </div>

                <button type="button" class="btn-add-date" id="addTripBtn">
                    + Aggiungi un altro giorno (Max 5)
                </button>
            </div>

            <button type="button" class="btn-submit" id="submitBtn">
                Apri su WhatsApp
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
            }

            const MAX_TRIPS = 5;
            const WHATSAPP_NUMBER = '393792857328';

            const container = document.getElementById('tripsContainer');
            const addBtn = document.getElementById('addTripBtn');
            const submitBtn = document.getElementById('submitBtn');

            let tripIndex = 2;

            const today = new Date().toISOString().split('T')[0];
            document.querySelectorAll('.date-input').forEach(input => input.min = today);

            const sanitize = (text) => text.replace(/[<>]/g, '').trim();

            const getItalianDayName = (dateString) => {
                const days = ['Domenica', 'Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì', 'Sabato'];
                const dateParts = dateString.split('-');
                const dateObj = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]);
                return days[dateObj.getDay()];
            };

            const formatDate = (date) => {
                const [year, month, day] = date.split('-');
                return `${day}/${month}/${year}`;
            };

            const updateAddButton = () => {
                const rows = document.querySelectorAll('.trip-row');
                addBtn.style.display = rows.length >= MAX_TRIPS ? 'none' : 'block';
            };

            const createTripRow = () => {
                const rows = document.querySelectorAll('.trip-row');
                if (rows.length >= MAX_TRIPS) return;

                const row = document.createElement('div');
                row.className = 'trip-row';

                row.innerHTML = `
                    <div class="trip-field">
                        <label class="inner-label" style="font-size: 10px; color: var(--text-light);">Data 🗓️</label>
                        <input type="date" class="date-input" required />
                    </div>
                    <div class="trip-field">
                        <label class="inner-label" style="font-size: 10px; color: var(--text-light);">Ora ⏰</label>
                        <input type="time" class="time-input" required />
                    </div>
                    <button type="button" class="btn-remove-date">Elimina questo giorno</button>
                `;

                row.querySelector('.btn-remove-date').addEventListener('click', () => {
                    row.remove();
                    updateAddButton();
                });

                container.appendChild(row);
                row.querySelector('.date-input').min = today;
                
                tripIndex++;
                updateAddButton();
            };

            addBtn.addEventListener('click', createTripRow);

            submitBtn.addEventListener('click', () => {
                const cognomeInput = document.getElementById('cognome');
                const nomeInput = document.getElementById('nome');
                const cittaInput = document.getElementById('citta');
                const indirizzoInput = document.getElementById('indirizzo');

                if (!cognomeInput.value || !nomeInput.value || !cittaInput.value || !indirizzoInput.value) {
                    alert('Per favore, compila tutti i campi richiesti.');
                    return;
                }

                const cognome = sanitize(cognomeInput.value);
                const nome = sanitize(nomeInput.value);
                const citta = sanitize(cittaInput.value);
                const indirizzo = sanitize(indirizzoInput.value);
                const rows = document.querySelectorAll('.trip-row');

                let whatsappTrips = '';
                let valid = true;

                rows.forEach((row, index) => {
                    const dateInput = row.querySelector('.date-input');
                    const timeInput = row.querySelector('.time-input');

                    if (!dateInput.value || !timeInput.value) {
                        valid = false;
                        return;
                    }

                    const formattedDate = formatDate(dateInput.value);
                    const dayName = getItalianDayName(dateInput.value);
                    whatsappTrips += `   ${index + 1}) *${dayName}* - ${formattedDate} ➜ ore *${timeInput.value}*\n`;
                });

                if (!valid) {
                    alert('Per favore, imposta data e ora per tutti i giorni aggiunti.');
                    return;
                }

                const noteInput = document.getElementById('note');
                const noteText = noteInput.value ? sanitize(noteInput.value) : 'Nessuna';

                const whatsappText = `*PRENOTAZIONE TRASPORTO - AIL NOVARA*\n\n` +
                                     `• *Cognome:* ${cognome}\n` +
                                     `• *Nome:* ${nome}\n` +
                                     `• *Indirizzo:* ${indirizzo}, ${citta} 📍\n` +
                                     `• *Note:* ${noteText} 📝\n\n` +
                                     `• *Viaggi richiesti:*\n${whatsappTrips}`;

                window.open(`https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(whatsappText)}`, '_blank');
            });
        });
    </script>
</body>
</html>
